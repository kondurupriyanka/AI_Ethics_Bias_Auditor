<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="biasGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="50%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#1e293b" stroke-width="16" />
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#biasGradient)" stroke-width="16" stroke-dasharray="502" stroke-dashoffset="251" transform="rotate(-90 100 100)" filter="url(#glow)" class="bias-meter" />
  <text x="100" y="100" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" class="bias-score">50</text>
  <text x="100" y="125" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle">Bias Score</text>
</svg>