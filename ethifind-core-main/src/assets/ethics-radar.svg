<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="radarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.7" />
    </linearGradient>
    <filter id="radarGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g transform="translate(150,150)">
    <!-- Background circles -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#1e293b" stroke-width="1" />
    <circle cx="0" cy="0" r="90" fill="none" stroke="#1e293b" stroke-width="1" />
    <circle cx="0" cy="0" r="60" fill="none" stroke="#1e293b" stroke-width="1" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="#1e293b" stroke-width="1" />
    
    <!-- Axis lines -->
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#1e293b" stroke-width="1" />
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#1e293b" stroke-width="1" />
    <line x1="-84.85" y1="-84.85" x2="84.85" y2="84.85" stroke="#1e293b" stroke-width="1" />
    <line x1="84.85" y1="-84.85" x2="-84.85" y2="84.85" stroke="#1e293b" stroke-width="1" />
    
    <!-- Data polygon -->
    <polygon points="0,-100 86.6,-50 86.6,50 0,80 -86.6,50 -86.6,-50" fill="url(#radarGradient)" stroke="#8b5cf6" stroke-width="2" filter="url(#radarGlow)" />
    
    <!-- Data points -->
    <circle cx="0" cy="-100" r="5" fill="#f472b6" />
    <circle cx="86.6" cy="-50" r="5" fill="#f472b6" />
    <circle cx="86.6" cy="50" r="5" fill="#f472b6" />
    <circle cx="0" cy="80" r="5" fill="#f472b6" />
    <circle cx="-86.6" cy="50" r="5" fill="#f472b6" />
    <circle cx="-86.6" cy="-50" r="5" fill="#f472b6" />
    
    <!-- Labels -->
    <text x="0" y="-130" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Fairness</text>
    <text x="105" y="-55" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="start">Transparency</text>
    <text x="105" y="55" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="start">Accountability</text>
    <text x="0" y="95" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Privacy</text>
    <text x="-105" y="55" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="end">Safety</text>
    <text x="-105" y="-55" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="end">Inclusivity</text>
  </g>
</svg>